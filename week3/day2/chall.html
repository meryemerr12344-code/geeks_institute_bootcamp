<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giphy Random Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #gif-container {
      margin-top: 20px;
    }

    .gif-item {
      margin: 15px;
    }

    img {
      display: block;
      margin: 10px auto;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🎬 Random GIF Generator</h1>

  <form id="gif-form">
    <input type="text" id="search-input" placeholder="Enter category (ex: sun)" required>
    <button type="submit">Get GIF</button>
  </form>

  <button id="delete-all">DELETE ALL</button>

  <div id="gif-container"></div>

  <script src="script.js"></script>
</body>
</html>
